services:
  - type: web
    name: mentora-backend
    env: node
    rootDir: mentora-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGINS
        value: "*"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
